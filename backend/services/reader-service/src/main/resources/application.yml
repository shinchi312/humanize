server:
  port: 8084

spring:
  application:
    name: reader-service
  datasource:
    url: ${READER_DB_URL:jdbc:h2:mem:readerdb;MODE=PostgreSQL;DB_CLOSE_DELAY=-1}
    username: ${READER_DB_USERNAME:sa}
    password: ${READER_DB_PASSWORD:}
    driver-class-name: ${READER_DB_DRIVER:org.h2.Driver}
  jpa:
    hibernate:
      ddl-auto: ${READER_DB_DDL_AUTO:validate}
    properties:
      hibernate:
        format_sql: true
  flyway:
    enabled: ${READER_FLYWAY_ENABLED:true}
    baseline-on-migrate: ${READER_FLYWAY_BASELINE_ON_MIGRATE:true}
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      properties:
        spring.json.add.type.headers: false
    consumer:
      group-id: reader-service
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: com.humanize.*
        spring.json.value.default.type: com.humanize.contracts.events.DomainEvent

management:
  endpoints:
    web:
      exposure:
        include: health,info
