server:
  port: 8083

spring:
  application:
    name: ingestion-service
  datasource:
    url: ${INGESTION_DB_URL:jdbc:h2:mem:ingestiondb;MODE=PostgreSQL;DB_CLOSE_DELAY=-1}
    username: ${INGESTION_DB_USERNAME:sa}
    password: ${INGESTION_DB_PASSWORD:}
    driver-class-name: ${INGESTION_DB_DRIVER:org.h2.Driver}
  jpa:
    hibernate:
      ddl-auto: ${INGESTION_DB_DDL_AUTO:validate}
    properties:
      hibernate:
        format_sql: true
  flyway:
    enabled: ${INGESTION_FLYWAY_ENABLED:true}
    baseline-on-migrate: ${INGESTION_FLYWAY_BASELINE_ON_MIGRATE:true}
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      properties:
        spring.json.add.type.headers: false
    consumer:
      group-id: ingestion-service
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: com.humanize.*
        spring.json.value.default.type: com.humanize.contracts.events.DomainEvent

management:
  endpoints:
    web:
      exposure:
        include: health,info

app:
  ingestion:
    local-source-root: ${INGESTION_LOCAL_SOURCE_ROOT:}
    min-extracted-chars: ${INGESTION_MIN_EXTRACTED_CHARS:400}
    ocr-enabled: ${INGESTION_OCR_ENABLED:true}
    ocr-command: ${INGESTION_OCR_COMMAND:tesseract}
    ocr-timeout-seconds: ${INGESTION_OCR_TIMEOUT_SECONDS:45}
  r2:
    account-id: ${R2_ACCOUNT_ID:}
    endpoint: ${R2_ENDPOINT:}
    bucket: ${R2_BUCKET:humanize-books}
    access-key-id: ${R2_ACCESS_KEY_ID:}
    secret-access-key: ${R2_SECRET_ACCESS_KEY:}
