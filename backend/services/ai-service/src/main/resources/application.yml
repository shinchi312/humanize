server:
  port: 8088

spring:
  application:
    name: ai-service
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      properties:
        spring.json.add.type.headers: false
    consumer:
      group-id: ai-service
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: com.humanize.*
        spring.json.value.default.type: com.humanize.contracts.events.DomainEvent

management:
  endpoints:
    web:
      exposure:
        include: health,info

app:
  ai:
    provider: ${AI_PROVIDER:heuristic}
    model: ${AI_MODEL:llama3.2:3b}
    ollama-base-url: ${AI_OLLAMA_BASE_URL:http://localhost:11434}
    max-preview-chars: ${AI_MAX_PREVIEW_CHARS:260}
