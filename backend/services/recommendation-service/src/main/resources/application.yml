server:
  port: 8086

spring:
  application:
    name: recommendation-service
  datasource:
    url: ${RECO_DB_URL:jdbc:h2:mem:recodb;MODE=PostgreSQL;DB_CLOSE_DELAY=-1}
    username: ${RECO_DB_USERNAME:sa}
    password: ${RECO_DB_PASSWORD:}
    driver-class-name: ${RECO_DB_DRIVER:org.h2.Driver}
  jpa:
    hibernate:
      ddl-auto: ${RECO_DB_DDL_AUTO:validate}
    properties:
      hibernate:
        format_sql: true
  flyway:
    enabled: ${RECO_FLYWAY_ENABLED:true}
    baseline-on-migrate: ${RECO_FLYWAY_BASELINE_ON_MIGRATE:true}
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      properties:
        spring.json.add.type.headers: false
    consumer:
      group-id: recommendation-service
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: com.humanize.*
        spring.json.value.default.type: com.humanize.contracts.events.DomainEvent

management:
  endpoints:
    web:
      exposure:
        include: health,info
